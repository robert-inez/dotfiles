# alacritty.toml
# Foundational config — terminal-first developer workflow
# Nix home-manager equivalent: programs.alacritty.settings = { ... }

# ─── General ──────────────────────────────────────────────────────────────────

[general]
live_config_reload = true

# ─── Window ───────────────────────────────────────────────────────────────────

[window]
padding = { x = 8, y = 8 }
decorations = "full"          # "none" if you want borderless inside a WM
opacity = 1.0                 # 0.9 for slight transparency if you prefer
dynamic_title = true          # tmux will override this anyway

# ─── Scrolling ────────────────────────────────────────────────────────────────

[scrolling]
history = 10000               # lines of scrollback (tmux handles most of this)
multiplier = 3

# ─── Font ─────────────────────────────────────────────────────────────────────
# Swap to whatever Nerd Font you use — JetBrains Mono, Hack, Iosevka, etc.
# Nerd Font variant needed if you use statusline glyphs in tmux/nvim

[font]
size = 12.0

[font.normal]
family = "CaskaydiaCove Nerd Font"
style  = "Regular"

[font.bold]
family = "CaskaydiaCove Nerd Font"
style  = "Bold"

[font.italic]
family = "CaskaydiaCove Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "CaskaydiaCove Nerd Font"
style  = "Bold Italic"

# Ligatures are handled by the font itself — no Alacritty setting needed
# JetBrains Mono has them on by default

# ─── Colors (Catppuccin Mocha) ────────────────────────────────────────────────
# Popular, well-maintained, ports exist for tmux/nvim/fish/everything in your stack
# Swap the entire [colors] block to change theme — easy to manage in dotfiles

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

# ─── Cursor ───────────────────────────────────────────────────────────────────

[cursor]
style = { shape = "Block", blinking = "Off" }
vi_mode_style = { shape = "Block", blinking = "Off" }
unfocused_hollow = true       # hollow cursor when window loses focus

# ─── Terminal ─────────────────────────────────────────────────────────────────

[terminal]
shell = { program = "/usr/bin/fish", args = [] }

# ─── Keyboard ─────────────────────────────────────────────────────────────────
# Minimal — let tmux handle splits, windows, sessions
# Only override things Alacritty needs to pass correctly to tmux

[[keyboard.bindings]]
key     = "Return"
mods    = "Control|Shift"
action  = "SpawnNewInstance"  # new window, tmux session from scratch

# ─── Mouse ────────────────────────────────────────────────────────────────────

[mouse]
hide_when_typing = true       # clean typing experience
